<ion-header>
  <ion-toolbar>



    <ion-title>{{ movieDetails?.title }}</ion-title>

    <!-- Favourites Button -->
    <ion-buttons slot="end">
      <ion-button (click)="goHome()">
        <ion-icon slot="icon-only" [icon]="home"></ion-icon>
      </ion-button>
      <ion-button (click)="goFavourites()"> <ion-icon slot="icon-only" [icon]="heart"></ion-icon></ion-button>
      
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content *ngIf="movieDetails">

  <!-- 🎬 Movie Banner -->
  <img 
    [src]="'https://image.tmdb.org/t/p/w500' + movieDetails.backdrop_path"
    style="width:100%; height:auto; object-fit:cover;" />

  <!-- 📄 Movie Info -->
  <div style="padding:15px;">
    <h2>{{ movieDetails.title }}</h2>
    <p><strong>Release:</strong> {{ movieDetails.release_date }}</p>
    <p><strong>Rating:</strong> ⭐ {{ movieDetails.vote_average }}</p>
    <p>{{ movieDetails.overview }}</p>
  </div>

  <!--  Button -->

  <ion-button size="small" (click)="isFavourite ? removeFromFavourites() : addToFavourites()">
  <!-- Icon -->
  <ion-icon 
    slot="start" 
    [name]="isFavourite ? 'trash' : 'heart'">
  </ion-icon>
    {{ isFavourite ? 'Remove From Favourites' :' Add To Favourites' }}
  
  </ion-button>
  <!-- Cast Section -->
  <h2 style="padding-left:10px;">Cast</h2>

  <ion-list>
    <ion-item *ngFor="let actor of cast">

      <!-- Actor Image -->
      <ion-avatar slot="start">
        <img 
          *ngIf="actor.profile_path"
          [src]="'https://image.tmdb.org/t/p/w200' + actor.profile_path" />
      </ion-avatar>

      <!-- Actor Info -->
      <ion-label>
        <h3>{{ actor.name }}</h3>
        <p>{{ actor.character }}</p>
      </ion-label>

    </ion-item>
  </ion-list>

</ion-content>
